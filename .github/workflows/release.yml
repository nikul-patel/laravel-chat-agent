name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Validate Package (${{ matrix.database.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database:
          - name: SQLite
            connection: sqlite
          - name: MySQL
            connection: mysql
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel
          MYSQL_USER: testing
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          if [ "${{ matrix.database.connection }}" = "sqlite" ]; then
            touch database/database.sqlite
            echo "DB_CONNECTION=sqlite" >> .env
            echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env
          else
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=127.0.0.1" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=laravel" >> .env
            echo "DB_USERNAME=testing" >> .env
            echo "DB_PASSWORD=secret" >> .env
          fi
          php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
